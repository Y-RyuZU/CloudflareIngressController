apiVersion: v1
kind: Service
metadata:
  name: rustdesk-server
  labels:
    app: rustdesk-server
spec:
  # Exposed via VyOS DNAT (WAN 21115-21117 -> node 31115-31117),
  # NOT via Cloudflare Tunnel: RustDesk clients speak raw TCP/UDP and
  # public UDP ingress is unsupported by cloudflared.
  type: NodePort
  selector:
    app: rustdesk-server
  ports:
    - name: hbbs-punch
      port: 21115
      targetPort: 21115
      nodePort: 31115
      protocol: TCP
    - name: hbbs-id-tcp
      port: 21116
      targetPort: 21116
      nodePort: 31116
      protocol: TCP
    - name: hbbs-id-udp
      port: 21116
      targetPort: 21116
      nodePort: 31116
      protocol: UDP
    - name: hbbr-relay
      port: 21117
      targetPort: 21117
      nodePort: 31117
      protocol: TCP
